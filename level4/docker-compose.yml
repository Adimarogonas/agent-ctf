version: "3.9"
services:
  level4:
    build:
      context: .
      dockerfile: dockerfile
    container_name: ctf-level4
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
      - /var/log:rw,size=64m
      - /data:rw,size=64m
      - /vault:rw,size=64m
    volumes:
      - level4-bonsai:/models
    ports:
      - "8084:8084"
    environment:
      PYTHONUNBUFFERED: "1"
      BONSAI_BASE_URL: ${BONSAI_BASE_URL:-http://127.0.0.1:8000/v1}
      BONSAI_MODEL: ${BONSAI_MODEL:-bonsai-8b}
      BONSAI_API_KEY: ${BONSAI_API_KEY:-local}
      BONSAI_TIMEOUT_SECONDS: ${BONSAI_TIMEOUT_SECONDS:-120}
      BONSAI_MAX_TOKENS: ${BONSAI_MAX_TOKENS:-256}
      BONSAI_MODEL_FILE: ${BONSAI_MODEL_FILE:-Bonsai-8B.gguf}
      BONSAI_MODEL_URL: ${BONSAI_MODEL_URL:-https://huggingface.co/prism-ml/Bonsai-8B-gguf/resolve/main/Bonsai-8B.gguf?download=true}
      BONSAI_INTERNAL_PORT: ${BONSAI_INTERNAL_PORT:-8000}
      BONSAI_BOOT_WAIT_SECONDS: ${BONSAI_BOOT_WAIT_SECONDS:-240}
      BONSAI_CTX_SIZE: ${BONSAI_CTX_SIZE:-4096}
      BONSAI_N_GPU_LAYERS: ${BONSAI_N_GPU_LAYERS:-0}
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    command: ["/bin/bash", "/app/run.sh"]

volumes:
  level4-bonsai:
